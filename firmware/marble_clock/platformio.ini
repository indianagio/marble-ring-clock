; PlatformIO configuration for Marble Ring Clock
; Targets: Lolin32 Lite (ESP32) and ESP32-C3 Mini

; Shared settings
[common]
lib_deps =
  fastled/FastLED @ ^3.9.0
  mathieucarbou/AsyncTCP @ ^3.3.0
  mathieucarbou/ESPAsyncWebServer @ ^3.3.0
  bblanchon/ArduinoJson @ ^7.2.0
  arduino-libraries/NTPClient @ ^3.2.1

; Lolin32 Lite (target finale)
[env:lolin32lite]
platform = espressif32 @ ^6.7.0
board = lolin32_lite
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps = ${common.lib_deps}
build_flags =
  -DCORE_DEBUG_LEVEL=0
extra_scripts =
  pre:scripts/build_fs.py

[env:lolin32lite_ota]
extends = env:lolin32lite
upload_protocol = espota
upload_port = marble-clock.local
upload_flags = --auth=

; ESP32-C3 Mini
; ARDUINO_USB_MODE=1         -> abilita USB hardware nativo
; ARDUINO_USB_CDC_ON_BOOT=1  -> mappa Serial su USB-CDC al boot
[env:esp32c3mini]
platform = espressif32 @ ^6.7.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps = ${common.lib_deps}
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDATA_PIN_OVERRIDE=8
extra_scripts =
  pre:scripts/build_fs.py

[env:esp32c3mini_ota]
extends = env:esp32c3mini
upload_protocol = espota
upload_port = marble-clock.local
upload_flags = --auth=
