; PlatformIO configuration for Marble Ring Clock
; Targets: Lolin32 Lite (ESP32) and ESP32-C3 Mini (for testing)

; ─── Shared settings ───────────────────────────────────────────────────
[common]
lib_deps =
  fastled/FastLED @ ^3.7.0
  esphome/AsyncTCP-esphome @ ^2.1.4
  esphome/ESPAsyncWebServer-esphome @ ^3.3.0
  bblanchon/ArduinoJson @ ^7.2.0
  arduino-libraries/NTPClient @ ^3.2.1

; ─── Lolin32 Lite (target finale) ────────────────────────────────────────
[env:lolin32lite]
platform = espressif32
board = lolin32_lite
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps = ${common.lib_deps}
build_flags =
  -DCORE_DEBUG_LEVEL=0
extra_scripts =
  pre:scripts/build_fs.py

[env:lolin32lite_ota]
extends = env:lolin32lite
upload_protocol = espota
upload_port = marble-clock.local
upload_flags = --auth=

; ─── ESP32-C3 Mini (per test/sviluppo) ──────────────────────────────────
; NOTA: ESP32-C3 e' RISC-V, non Xtensa. FastLED >= 3.7 supporta C3 nativamente.
; GPIO usati per i LED: di default DATA_PIN 8 (cambiabile in firmware).
; ATTENZIONE: su C3 non usare GPIO 18/19 (USB), GPIO 2 (JTAG bootstrap).
[env:esp32c3mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps = ${common.lib_deps}
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1    ; abilita Serial via USB-CDC (non serve adattatore UART)
  -DDATA_PIN_OVERRIDE=8          ; sovrascrive il pin dati LED (GPIO8 su C3 mini e' sicuro)
extra_scripts =
  pre:scripts/build_fs.py

[env:esp32c3mini_ota]
extends = env:esp32c3mini
upload_protocol = espota
upload_port = marble-clock.local
upload_flags = --auth=
