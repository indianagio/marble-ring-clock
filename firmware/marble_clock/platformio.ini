; Marble Ring Clock - PlatformIO config
;
; Board target:  Lolin32 Lite (produzione)
; Board test:    ESP32-C3 Mini (devkitm-1)
;
; Per flashare sulla board di test:
;   pio run -e c3mini --target upload
;   pio run -e c3mini --target uploadfs
;
; Per flashare sulla board di produzione:
;   pio run -e lolin32lite --target upload
;   pio run -e lolin32lite --target uploadfs

[env]
monitor_speed = 115200
lib_deps =
    arduino-libraries/NTPClient @ ^3.2.1
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.9.0
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
    mathieucarbou/AsyncTCP @ ^3.2.0

; ── Lolin32 Lite (target produzione, DATA_PIN = 5) ──────────────────────────
[env:lolin32lite]
platform  = espressif32
board     = lolin32_lite
framework = arduino
board_build.filesystem = littlefs
build_flags =
    -D DATA_PIN_OVERRIDE=5
lib_extra_dirs =

; ── ESP32-C3 Mini (board di test, DATA_PIN = 8) ─────────────────────────────
; ARDUINO_USB_CDC_ON_BOOT=1  -> abilita USB CDC (Serial via USB)
; ARDUINO_USB_MODE=1         -> HWCDC mode richiesto su C3 per evitare
;                               l'errore "Serial was not declared" in
;                               HardwareSerial.cpp del framework Arduino
[env:c3mini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino
board_build.filesystem = littlefs
build_flags =
    -D DATA_PIN_OVERRIDE=8
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
lib_extra_dirs =
