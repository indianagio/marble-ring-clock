; PlatformIO configuration for Marble Ring Clock
; Board: Lolin32 Lite (ESP32)

[env:lolin32lite]
platform = espressif32
board = lolin32_lite
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs

lib_deps =
  fastled/FastLED @ ^3.7.0
  esphome/AsyncTCP-esphome @ ^2.1.4
  esphome/ESPAsyncWebServer-esphome @ ^3.3.0
  bblanchon/ArduinoJson @ ^7.2.0
  arduino-libraries/NTPClient @ ^3.2.1

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM

extra_scripts =
  pre:scripts/build_fs.py

[env:lolin32lite_ota]
extends = env:lolin32lite
upload_protocol = espota
upload_port = marble-clock.local
upload_flags = --auth=
